<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Już wkrótce</title>
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #050505;
            color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 70%);
            z-index: -1;
        }
        .container {
            max-width: 800px;
            width: 100%;
            animation: fadeIn 1.5s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #f0f0f0;
            margin-bottom: 25px;
        }
        .loader-line {
            width: 80px;
            height: 2px;
            background: #222;
            margin: 0 auto 40px;
            position: relative;
            overflow: hidden;
        }
        .loader-line::after {
            content: '';
            position: absolute;
            left: -50%;
            height: 100%;
            width: 50%;
            background: #FF5500;
            animation: loading 2s infinite ease-in-out;
        }
        .status {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.6;
            color: #ccc;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes loading {
            0% { left: -50%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Już wkrótce</h1>
        <div class="loader-line"></div>
        <p class="status">Coś wyjątkowego jest w drodze.</p>
    </div>
</body>
</html>
